// 초성 검색
const CHO='ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
function getCho(s){return[...s].map(c=>{const n=c.charCodeAt(0);return n>=0xAC00&&n<=0xD7A3?CHO[Math.floor((n-0xAC00)/588)]:c}).join('')}
function isChoQ(s){return s.length>0&&[...s].every(c=>CHO.includes(c))}

function searchScore(e,raw){
  let sc=0;
  if(isChoQ(raw)){
    if(getCho(e.t).includes(raw))sc+=100;
    if(e.tags.some(t=>getCho(t).includes(raw)))sc+=30;
    if(getCho(e.sum||'').includes(raw))sc+=10;
  }else{
    const s=raw.toLowerCase();
    if(e.t.toLowerCase().includes(s))sc+=100;
    if(e.en.toLowerCase().includes(s))sc+=80;
    if(e.id.includes(s))sc+=60;
    if(e.tags.some(t=>t.toLowerCase().includes(s)))sc+=40;
    if((e.sum||'').toLowerCase().includes(s))sc+=20;
  }
  return sc;
}

// Bookmark (localStorage)
function getBookmarks(){try{return JSON.parse(localStorage.getItem('aw-bm')||'[]')}catch(e){return[]}}
function isBookmarked(id){return getBookmarks().includes(id)}
function toggleBookmark(id){const bm=getBookmarks();const i=bm.indexOf(id);if(i>=0)bm.splice(i,1);else bm.push(id);localStorage.setItem('aw-bm',JSON.stringify(bm));return i<0}

// Visited (localStorage)
function getVisited(){try{return JSON.parse(localStorage.getItem('aw-vis')||'[]')}catch(e){return[]}}
function markVisited(id){const v=getVisited();if(!v.includes(id)){v.push(id);localStorage.setItem('aw-vis',JSON.stringify(v))}}

// Auto-link keywords in HTML
function autoLinkKw(html,cid){
  const kws=D.filter(x=>x.id!==cid).flatMap(x=>{const t=[];if(x.t&&x.t.length>=2)t.push({term:x.t,id:x.id});if(x.en&&x.en!==x.t&&x.en.length>=3)t.push({term:x.en,id:x.id});return t}).sort((a,b)=>b.term.length-a.term.length);
  const linked=new Set();const parts=html.split(/(<[^>]+>)/);
  for(let i=0;i<parts.length;i++){if(parts[i].startsWith('<'))continue;for(const kw of kws){if(linked.has(kw.id))continue;const esc=kw.term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const re=new RegExp(esc,'i');if(re.test(parts[i])){parts[i]=parts[i].replace(re,`<span class="kw-link" onclick="event.stopPropagation();open_m('${kw.id}')">$&</span>`);linked.add(kw.id)}}}
  return parts.join('');
}

// Graph colors
const CAT_COLORS={prompting:'#E8A87C',model:'#D4A574',tooling:'#C4613A',data:'#85B8CB',agent:'#7EB09B',infra:'#A39BCC',safety:'#CC8B8B',application:'#C9B95E'};

// State
const PAGE_SIZE = 20;
let cat = 'all', q = '', page = 1;

function fmtLastUpdated(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  const y = d.getFullYear(), mo = pad(d.getMonth()+1), da = pad(d.getDate()), hr = pad(d.getHours()), min = pad(d.getMinutes());
  const tzShort = new Intl.DateTimeFormat('en', {timeZoneName:'short'}).formatToParts(d).find(p=>p.type==='timeZoneName').value;
  return `최근 업데이트: ${y}-${mo}-${da} ${hr}:${min} (${tzShort})`;
}

function render() {
  let list;
  const _c7 = new Date(Date.now()-7*24*60*60*1000).toISOString().slice(0,10);
  if (!q) {
    list = D.filter(e => {
      if (cat === 'hot') return HOT_IDS.includes(e.id);
      if (cat === 'new7') return (e.added||'') >= _c7;
      if (cat === 'bm') return isBookmarked(e.id);
      return cat === 'all' || e.c === cat;
    });
    if (cat === 'new7') list.sort((a,b) => (b.added||'').localeCompare(a.added||''));
    else list.sort((a,b) => (b.born||'').localeCompare(a.born||''));
  } else {
    const scored = [];
    for (const e of D) {
      if (cat === 'new7' && (e.added||'') < _c7) continue;
      if (cat !== 'all' && cat !== 'hot' && cat !== 'new7' && e.c !== cat) continue;
      if (cat === 'hot' && !HOT_IDS.includes(e.id)) continue;
      if (cat === 'bm' && !isBookmarked(e.id)) continue;
      const sc = searchScore(e, q);
      if (sc > 0) scored.push({e, sc});
    }
    scored.sort((a,b) => b.sc - a.sc || (b.e.born||'').localeCompare(a.e.born||''));
    list = scored.map(x => x.e);
  }

  _currentList = list;
  const _vis = getVisited();
  const _bms = getBookmarks();
  const g = document.getElementById('grid');
  const pg = document.getElementById('pagination');
  const countEl = document.getElementById('search-count');
  document.getElementById('sort-newest').textContent = L.newest;
  countEl.textContent = q ? list.length + '건' : (typeof LAST_UPDATED !== 'undefined' ? fmtLastUpdated(LAST_UPDATED) : '');
  if (!list.length) { g.innerHTML = `<div class="empty">${L.noResults}</div>`; pg.innerHTML = ''; return; }

  const total = list.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (page > totalPages) page = totalPages;
  const start = (page - 1) * PAGE_SIZE;
  const visible = list.slice(start, start + PAGE_SIZE);

  const now = new Date(), m3 = new Date(now.getFullYear(), now.getMonth()-3, 1), cutoff = m3.getFullYear()+'-'+String(m3.getMonth()+1).padStart(2,'0');
  g.innerHTML = visible.map(e => {
    const primary = LANG==='ko' ? e.t : (e.en||e.t);
    const secondary = LANG==='ko' ? e.en : (!/[\uAC00-\uD7AF]/.test(e.t)&&e.t!==primary ? e.t : '');
    const sub = secondary ? `<div class="card-sub">${secondary}</div>` : '';
    const isNew = e.born && e.born >= cutoff;
    const isHot = HOT_IDS.includes(e.id);
    const isBM = _bms.includes(e.id);
    const isVis = _vis.includes(e.id);
    return `<div class="card${isVis?' visited':''}" onclick="open_m('${e.id}')">
      <div class="card-cat">${CATS[e.c]}</div>
      ${isHot ? '<div class="card-hot">▲</div>' : ''}
      ${isBM ? '<div class="card-bookmark"><svg viewBox="0 0 16 16"><path d="M3 2.5A1.5 1.5 0 014.5 1h7A1.5 1.5 0 0113 2.5V15l-5-3.5L3 15V2.5z"/></svg></div>' : ''}
      ${isNew ? '<div class="card-new">NEW</div>' : ''}
      <div class="card-keyword">${primary}</div>
      ${sub}
    </div>`;
  }).join('');

  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let btns = [];
  const add = (n) => btns.push(`<button class="pg${n===page?' on':''}" onclick="goPage(${n})">${n}</button>`);
  const dot = () => btns.push('<span class="pg dot">…</span>');

  add(1);
  if (page > 4) dot();
  for (let i = Math.max(2, page-2); i <= Math.min(totalPages-1, page+2); i++) add(i);
  if (page < totalPages-3) dot();
  if (totalPages > 1) add(totalPages);

  pg.innerHTML = btns.join('');
}

function _syncPageUrl(){const u=new URL(location);if(page>1)u.searchParams.set('p',page);else u.searchParams.delete('p');history.replaceState({},'',u)}
function goPage(n) {
  page = n;
  _syncPageUrl();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Inline graph
function renderInlineGraph(centerId){
  document.getElementById('graph-legend').innerHTML=Object.entries(CATS).map(([k,v])=>`<span><span class="gl-dot" style="background:${CAT_COLORS[k]}"></span>${v}</span>`).join('');
  const center=D.find(x=>x.id===centerId);if(!center)return;
  const nodeIds=new Set([centerId]);const edges=[];
  (center.rel||[]).forEach(r=>{if(D.find(x=>x.id===r)){nodeIds.add(r);edges.push([centerId,r])}});
  const hop1=[...nodeIds];for(const nid of hop1){const n=D.find(x=>x.id===nid);if(!n)continue;(n.rel||[]).forEach(r=>{if(D.find(x=>x.id===r)){nodeIds.add(r);edges.push([nid,r])}})}
  const nodes=[...nodeIds].map(id=>D.find(x=>x.id===id)).filter(Boolean);
  const edgeSet=new Set();const dedupE=edges.filter(([a,b])=>{const k=[a,b].sort().join('|');if(edgeSet.has(k))return false;edgeSet.add(k);return true});
  const canvas=document.getElementById('graph-canvas');const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;const W=canvas.parentElement.getBoundingClientRect().width;const H=Math.min(500,window.innerHeight-150);
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';ctx.scale(dpr,dpr);
  const pos={};const gx=W/2,gy=H/2;
  nodes.forEach((n,i)=>{if(n.id===centerId){pos[n.id]={x:gx,y:gy,vx:0,vy:0}}else{const a=(2*Math.PI*i)/nodes.length;const r=80+Math.random()*60;pos[n.id]={x:gx+r*Math.cos(a),y:gy+r*Math.sin(a),vx:0,vy:0}}});
  for(let iter=0;iter<300;iter++){
    for(let i=0;i<nodes.length;i++){for(let j=i+1;j<nodes.length;j++){const a=pos[nodes[i].id],b=pos[nodes[j].id];const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(Math.sqrt(dx*dx+dy*dy),1);const f=4000/(d*d);a.vx-=(dx/d)*f;a.vy-=(dy/d)*f;b.vx+=(dx/d)*f;b.vy+=(dy/d)*f}}
    for(const[ea,eb]of dedupE){const pa=pos[ea],pb=pos[eb];if(!pa||!pb)continue;const dx=pb.x-pa.x,dy=pb.y-pa.y,d=Math.max(Math.sqrt(dx*dx+dy*dy),1);const f=d*0.008;pa.vx+=(dx/d)*f;pa.vy+=(dy/d)*f;pb.vx-=(dx/d)*f;pb.vy-=(dy/d)*f}
    const pad=40;for(const n of nodes){const p=pos[n.id];p.vx+=(gx-p.x)*0.005;p.vy+=(gy-p.y)*0.005;p.vx*=0.85;p.vy*=0.85;p.x+=p.vx;p.y+=p.vy;p.x=Math.max(pad,Math.min(W-pad,p.x));p.y=Math.max(pad,Math.min(H-pad,p.y))}
    pos[centerId].x=gx;pos[centerId].y=gy;pos[centerId].vx=0;pos[centerId].vy=0;
  }
  function draw(hId){
    ctx.clearRect(0,0,W,H);ctx.strokeStyle='#e4dfd8';ctx.lineWidth=1;
    for(const[ea,eb]of dedupE){const pa=pos[ea],pb=pos[eb];if(!pa||!pb)continue;ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke()}
    for(const n of nodes){const p=pos[n.id];const r=n.id===centerId?10:6;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=CAT_COLORS[n.c]||'#a09888';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle=n.id===hId?'#C4613A':'#2d2a26';ctx.font=n.id===centerId?'700 11px Noto Sans KR':'10px Noto Sans KR';ctx.textAlign='center';ctx.fillText(LANG==='ko'?n.t:(n.en||n.t),p.x,p.y+r+13)}
  }

if(window.Kakao&&KAKAO_KEY&&!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

function _shareFb(btn){
  btn.style.opacity='0.3';
  setTimeout(()=>{btn.style.opacity='';},300);
}
function copyLink(id){
  navigator.clipboard.writeText(BASE_URL+'#'+id).then(()=>_shareFb(document.getElementById('copy-btn')));
}
function shareKakao(id,btn){
  const e=D.find(x=>x.id===id), name=LANG==='ko'?e.t:(e.en||e.t);
  const url=BASE_URL+'#'+id;
  if(window.Kakao&&Kakao.isInitialized()){
    Kakao.Share.sendDefault({
      objectType:'feed',
      content:{title:name+' - AI Wiki',description:e.sum||'',imageUrl:'https://ai-wikipedia.github.io/og-thumbnail.png?v=2',imageWidth:1200,imageHeight:600,link:{mobileWebUrl:url,webUrl:url}}
    });
  } else {
    navigator.clipboard.writeText(name+' - AI Wiki\n'+url).then(()=>_shareFb(btn));
  }
}

window.addEventListener('popstate', () => {
  const hash = location.hash.slice(1);
  _hideAll();
  if (hash && D.find(x=>x.id===hash)) open_m(hash, false);
  else { _showGrid(); render(); window.scrollTo({top:_scrollY}); }
});

// URL ?q= / ?p= 파라미터 복원
const _sp = new URLSearchParams(location.search);
const _qq = _sp.get('q');
if (_qq) { q = _qq; document.getElementById('q').value = _qq; }
const _pp = parseInt(_sp.get('p'));
if (_pp > 1) page = _pp;

render();

// 페이지 로드 시 해시가 있으면 모달 오픈 (render 후 _currentList 확보)
if (location.hash) { const id = location.hash.slice(1); if (D.find(x=>x.id===id)) open_m(id, false); }

// JSON-LD DefinedTermSet 동적 생성
(function(){
  const ld = document.querySelectorAll('script[type="application/ld+json"]');
  if(ld.length>=2){
    const obj = JSON.parse(ld[1].textContent);
    obj.hasDefinedTerm = D.slice(0,50).map(e=>({
      "@type":"DefinedTerm",
      "name":e.t,
      "description":e.sum,
      "url":"https://ai-wikipedia.github.io/#"+e.id
    }));
    ld[1].textContent = JSON.stringify(obj);
  }
})();

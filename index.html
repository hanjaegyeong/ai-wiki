<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #F3F0EB;
    color: #4a4540;
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky; top:0; z-index:50;
    background: rgba(243,240,235,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid #ddd8d0;
    padding: 16px 32px;
    display: flex; align-items: center; gap: 24px;
  }

  .logo { font-size: 20px; font-weight: 900; color: #C4613A; letter-spacing: -0.5px; flex-shrink:0; }

  input {
    flex:1; max-width: 360px;
    padding: 8px 16px;
    background: #fff;
    border: 1px solid #d5d0c8;
    border-radius: 8px;
    color: #2d2a26;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input::placeholder { color: #aaa598; }
  input:focus { border-color: #C4613A; }

  .filters {
    display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto;
  }

  .f {
    padding: 5px 14px;
    background: transparent;
    border: 1px solid #d5d0c8;
    border-radius: 20px;
    color: #8a8478;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .f:hover { border-color: #b0a898; color: #5a5550; }
  .f.on { border-color: #C4613A; color: #C4613A; background: rgba(196,97,58,0.06); }

  /* Grid */
  .grid {
    max-width: 1400px;
    margin: 8px auto 32px;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* Card */
  .card {
    position: relative;
    background: #fff;
    border: 1px solid #e4dfd8;
    border-radius: 14px;
    padding: 24px;
    min-height: 200px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card:hover {
    background: #fdfcfa;
    border-color: #c8c0b8;
  }

  .card-cat {
    position: absolute;
    top: 16px; left: 20px;
    font-size: 11px;
    color: #a09888;
  }

  .card-keyword {
    font-size: 24px;
    font-weight: 900;
    color: #2d2a26;
    line-height: 1.3;
    letter-spacing: -0.3px;
    text-align: center;
  }

  .card-sub {
    font-size: 11px;
    color: #a09888;
    margin-top: 6px;
    text-align: center;
    line-height: 1.3;
  }

  /* No results */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 100px 20px;
    color: #a09888;
    font-size: 15px;
  }

  /* Grid Header */
  .grid-header {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 0 32px;
  }
  .grid-header { display:flex; align-items:center; gap:8px; }
  .sort-btn {
    font-size: 12px; font-weight: 400; color: #a09888; background: none; border: none;
    padding: 0; cursor: pointer;
  }
  .sort-btn.on { font-weight: 700; }
  .sort-sep { font-size: 12px; color: #d0c9c0; }
  .search-count { font-size: 12px; color: #a09888; margin-left: auto; }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 2px;
    padding: 32px 0 48px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .pg {
    background: none;
    border: none;
    color: #a09888;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    padding: 4px 8px;
  }
  .pg:hover { color: #C4613A; }
  .pg.on { color: #C4613A; font-weight: 700; }
  .pg.dot { cursor: default; }
  .pg.dot:hover { color: #a09888; }

  /* Detail Page */
  .detail-page {
    display: none;
    max-width: 640px;
    margin: 24px auto 48px;
    padding: 0 32px;
  }
  .detail-page.open { display: block; }

  .detail-back {
    display: inline-flex;
    align-items: center;
    background: none;
    border: none;
    color: #a09888;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    padding: 0;
    margin-bottom: 16px;
  }
  .detail-back:hover { color: #6a6560; }

  .share-actions { position:absolute; top:20px; right:20px; display:flex; gap:6px; }
  .share-btn {
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    border-radius:8px; background:none; border:1px solid #d5d0c8; color:#a09888;
    cursor:pointer; transition:all 0.15s;
  }
  .share-btn:hover { border-color:#b0a898; color:#6a6560; }
  .share-btn.kakao { background:#F5E6A0; border-color:#E0D08A; color:#5a4a2a; }
  .share-btn.kakao:hover { background:#EDDC88; border-color:#D4C470; }
  .share-btn svg { width:16px; height:16px; flex-shrink:0; }

  .modal {
    position: relative;
    background: #fff;
    border: 1px solid #e4dfd8;
    border-radius: 16px;
    width: 100%;
    padding: 36px;
  }

  .modal-cat { font-size: 12px; color: #a09888; margin-bottom: 8px; }
  .modal-title { font-size: 30px; font-weight: 900; color: #2d2a26; margin-bottom: 4px; letter-spacing: -0.5px; }
  .modal-en { font-size: 13px; color: #a09888; margin-bottom: 16px; }

  .modal-body p { font-size: 14px; color: #5a5550; line-height: 1.8; margin-bottom: 12px; }
  .modal-body h4 { font-size: 14px; font-weight: 700; color: #2d2a26; margin: 20px 0 8px; }
  .modal-body h4:first-child { margin-top: 0; }
  .modal-body ul { padding-left: 18px; margin: 6px 0; }
  .modal-body li { font-size: 13.5px; color: #6a6560; line-height: 1.7; margin-bottom: 3px; }
  .modal-body code { font-family: monospace; background: rgba(196,97,58,0.08); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: #C4613A; }
  .modal-body pre { background: #F3F0EB; border: 1px solid #e4dfd8; border-radius: 8px; padding: 14px; overflow-x:auto; margin: 10px 0; }
  .modal-body pre code { background:none; padding:0; font-size:12.5px; color:#4a4540; }

  .modal-related { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8e4de; }
  .modal-related h4 { margin-top: 0; }
  .rel-links { display:flex; flex-wrap:wrap; gap:8px; }
  .rel-link { font-size:13px; padding:6px 14px; border-radius:8px; background:#F3F0EB; color:#6a6560; cursor:pointer; border:1px solid #e4dfd8; }
  .rel-link:hover { background:#e8e4de; color:#2d2a26; }

  .modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:20px; }
  .modal-tags span { font-size:11px; padding:3px 9px; border-radius:12px; background:#F3F0EB; color:#8a8478; cursor:pointer; }
  .modal-tags span:hover { color:#C4613A; }

  .modal-refs { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e8e4de; }
  .modal-refs h4 { font-size: 13px; font-weight: 700; color: #2d2a26; margin: 0 0 10px; }
  .modal-refs a { display:block; font-size:13px; color:#C4613A; text-decoration:none; padding:4px 0; line-height:1.5; }
  .modal-refs a:hover { text-decoration:underline; }
  .modal-refs .ref-type { font-size:10px; color:#a09888; background:#F3F0EB; padding:1px 6px; border-radius:4px; margin-left:6px; vertical-align:middle; }

  .modal-videos { margin-top: 16px; }
  .modal-videos h4 { font-size: 13px; font-weight: 700; color: #2d2a26; margin: 0 0 10px; }
  .modal-videos a { display:flex; align-items:center; gap:8px; font-size:13px; color:#5a5550; text-decoration:none; padding:6px 0; }
  .modal-videos a:hover { color:#C4613A; }
  .modal-videos .yt-icon { color:#C4613A; font-size:14px; flex-shrink:0; }
  .modal-videos .vid-lang { font-size:10px; color:#a09888; background:#F3F0EB; padding:1px 6px; border-radius:4px; }

  .card-new { position:absolute; bottom:16px; right:18px; font-size:10px; font-weight:900; color:#C4613A; letter-spacing:0.5px; }
  .card-hot { position:absolute; top:16px; right:18px; font-size:10px; font-weight:900; color:#C4613A; letter-spacing:0.5px; }
  .modal-born { font-size:12px; color:#a09888; margin-bottom:12px; }

  @media (max-width:700px) {
    header { flex-wrap:wrap; padding:12px 16px; }
    input { max-width:100%; order:10; flex-basis:100%; }
    .filters { order:11; width:100%; }
    .grid-header { padding:0 12px; margin:12px auto 0; }
    .grid { padding:0 12px; margin:8px auto; grid-template-columns:1fr; }
    .card { min-height:160px; padding:24px 20px; }
    .card-keyword { font-size:22px; }
    .detail-page { padding:0 12px; margin:16px auto 32px; }
    .share-actions { top:14px; right:14px; }
    .modal { padding:24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AI Wiki</div>
  <input type="text" id="q" placeholder="검색..." autocomplete="off">
  <div class="filters" id="filters"></div>
</header>

<div class="grid-header">
  <button class="sort-btn on" id="sort-newest"></button>
  <span class="sort-sep">|</span>
  <button class="sort-btn" id="hot-btn">HOT</button>
  <span class="search-count" id="search-count"></span>
</div>
<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>

<div class="detail-page" id="detail">
  <button class="detail-back" id="detail-back" onclick="close_m()"></button>
  <div class="modal" id="modal"></div>
</div>

<script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
<script src="data.js"></script>
<script>
const _ql = new URLSearchParams(location.search).get('lang');
const _nl = (_ql || navigator.language || 'ko').slice(0,2);
const LANG = ['ko','zh','ja'].includes(_nl) ? _nl : 'en';
document.documentElement.lang = LANG;

const I18N = {
  ko: {
    search:'검색...', all:'전체', hot:'HOT', noResults:'검색 결과 없음', loadMore:'더 보기', newest:'최신순', back:'← 돌아가기', copyLink:'링크 복사', copied:'복사됨!',
    refs:'레퍼런스', videos:'영상', related:'관련 키워드',
    born:(y,m)=> m&&+m ? y+'년 '+(+m)+'월 등장' : y+'년 등장',
    cats:{prompting:'프롬프팅',model:'모델',tooling:'도구',data:'데이터',agent:'에이전트',infra:'인프라',safety:'안전',application:'응용'}
  },
  en: {
    search:'Search...', all:'All', hot:'HOT', noResults:'No results found', loadMore:'Load more', newest:'Newest', back:'← Back', copyLink:'Copy link', copied:'Copied!',
    refs:'References', videos:'Videos', related:'Related',
    born:(y,m)=> m&&+m ? `Appeared ${y}-${String(+m).padStart(2,'0')}` : `Appeared ${y}`,
    cats:{prompting:'Prompting',model:'Model',tooling:'Tooling',data:'Data',agent:'Agent',infra:'Infra',safety:'Safety',application:'Application'}
  },
  zh: {
    search:'搜索...', all:'全部', hot:'HOT', noResults:'未找到结果', loadMore:'加载更多', newest:'最新', back:'← 返回', copyLink:'复制链接', copied:'已复制!',
    refs:'参考资料', videos:'视频', related:'相关关键词',
    born:(y,m)=> m&&+m ? `${y}年${+m}月出现` : `${y}年出现`,
    cats:{prompting:'提示工程',model:'模型',tooling:'工具',data:'数据',agent:'智能体',infra:'基础设施',safety:'安全',application:'应用'}
  },
  ja: {
    search:'検索...', all:'すべて', hot:'HOT', noResults:'結果が見つかりません', loadMore:'もっと見る', newest:'新しい順', back:'← 戻る', copyLink:'リンクをコピー', copied:'コピー済み!',
    refs:'参考資料', videos:'動画', related:'関連キーワード',
    born:(y,m)=> m&&+m ? `${y}年${+m}月登場` : `${y}年登場`,
    cats:{prompting:'プロンプト',model:'モデル',tooling:'ツール',data:'データ',agent:'エージェント',infra:'インフラ',safety:'安全性',application:'応用'}
  }
};
const L = I18N[LANG];
const CATS = L.cats;
document.getElementById('q').placeholder = L.search;
document.getElementById('detail-back').textContent = L.back;

// 초성 검색
const CHO='ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
function getCho(s){return[...s].map(c=>{const n=c.charCodeAt(0);return n>=0xAC00&&n<=0xD7A3?CHO[Math.floor((n-0xAC00)/588)]:c}).join('')}
function isChoQ(s){return s.length>0&&[...s].every(c=>CHO.includes(c))}

function searchScore(e,raw){
  let sc=0;
  if(isChoQ(raw)){
    if(getCho(e.t).includes(raw))sc+=100;
    if(e.tags.some(t=>getCho(t).includes(raw)))sc+=30;
    if(getCho(e.sum||'').includes(raw))sc+=10;
  }else{
    const s=raw.toLowerCase();
    if(e.t.toLowerCase().includes(s))sc+=100;
    if(e.en.toLowerCase().includes(s))sc+=80;
    if(e.id.includes(s))sc+=60;
    if(e.tags.some(t=>t.toLowerCase().includes(s)))sc+=40;
    if((e.sum||'').toLowerCase().includes(s))sc+=20;
  }
  return sc;
}

// State
const PAGE_SIZE = 20;
let cat = 'all', q = '', page = 1;

function render() {
  let list;
  if (!q) {
    list = D.filter(e => {
      if (cat === 'hot') return HOT_IDS.includes(e.id);
      return cat === 'all' || e.c === cat;
    });
    list.sort((a,b) => (b.born||'').localeCompare(a.born||''));
  } else {
    const scored = [];
    for (const e of D) {
      if (cat !== 'all' && cat !== 'hot' && e.c !== cat) continue;
      if (cat === 'hot' && !HOT_IDS.includes(e.id)) continue;
      const sc = searchScore(e, q);
      if (sc > 0) scored.push({e, sc});
    }
    scored.sort((a,b) => b.sc - a.sc || (b.e.born||'').localeCompare(a.e.born||''));
    list = scored.map(x => x.e);
  }

  const g = document.getElementById('grid');
  const pg = document.getElementById('pagination');
  const countEl = document.getElementById('search-count');
  document.getElementById('sort-newest').textContent = L.newest;
  countEl.textContent = q ? list.length + '건' : '';
  if (!list.length) { g.innerHTML = `<div class="empty">${L.noResults}</div>`; pg.innerHTML = ''; return; }

  const total = list.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (page > totalPages) page = totalPages;
  const start = (page - 1) * PAGE_SIZE;
  const visible = list.slice(start, start + PAGE_SIZE);

  const now = new Date(), m3 = new Date(now.getFullYear(), now.getMonth()-3, 1), cutoff = m3.getFullYear()+'-'+String(m3.getMonth()+1).padStart(2,'0');
  g.innerHTML = visible.map(e => {
    const primary = LANG==='ko' ? e.t : (e.en||e.t);
    const secondary = LANG==='ko' ? e.en : (!/[\uAC00-\uD7AF]/.test(e.t)&&e.t!==primary ? e.t : '');
    const sub = secondary ? `<div class="card-sub">${secondary}</div>` : '';
    const isNew = e.born && e.born >= cutoff;
    const isHot = HOT_IDS.includes(e.id);
    return `<div class="card" onclick="open_m('${e.id}')">
      <div class="card-cat">${CATS[e.c]}</div>
      ${isHot ? '<div class="card-hot">▲</div>' : ''}
      ${isNew ? '<div class="card-new">NEW</div>' : ''}
      <div class="card-keyword">${primary}</div>
      ${sub}
    </div>`;
  }).join('');

  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let btns = [];
  const add = (n) => btns.push(`<button class="pg${n===page?' on':''}" onclick="goPage(${n})">${n}</button>`);
  const dot = () => btns.push('<span class="pg dot">…</span>');

  add(1);
  if (page > 4) dot();
  for (let i = Math.max(2, page-2); i <= Math.min(totalPages-1, page+2); i++) add(i);
  if (page < totalPages-3) dot();
  if (totalPages > 1) add(totalPages);

  pg.innerHTML = btns.join('');
}

function goPage(n) {
  page = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Filters
(function(){
  const f = document.getElementById('filters');
  f.innerHTML = `<button class="f on" data-c="all">${L.all}</button>` +
    Object.entries(CATS).map(([k,v])=>`<button class="f" data-c="${k}">${v}</button>`).join('');
  f.addEventListener('click', e => {
    const b = e.target.closest('.f');
    if (!b) return;
    f.querySelectorAll('.f').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('hot-btn').classList.remove('on');
    cat = b.dataset.c;
    page = 1;
    render();
  });
})();

// Sort toggle (최신순 / HOT)
(function(){
  const newest = document.getElementById('sort-newest');
  const hot = document.getElementById('hot-btn');
  if (!HOT_IDS.length) hot.style.display='none';
  function toggle(mode) {
    cat = mode === 'hot' ? 'hot' : 'all';
    newest.classList.toggle('on', mode !== 'hot');
    hot.classList.toggle('on', mode === 'hot');
    document.querySelectorAll('.f').forEach(x => x.classList.toggle('on', mode !== 'hot' && x.dataset.c === 'all'));
    page = 1;
    render();
  }
  newest.addEventListener('click', () => toggle('newest'));
  hot.addEventListener('click', () => toggle(cat === 'hot' ? 'newest' : 'hot'));
})();

// Search (debounced)
let _dt;
document.getElementById('q').addEventListener('input', e => {
  clearTimeout(_dt);
  _dt = setTimeout(() => { q = e.target.value.trim(); page = 1; render(); }, 150);
});

// Detail page
let _scrollY = 0;
function open_m(id, pushState) {
  const e = D.find(x=>x.id===id);
  if (!e) return;
  if (pushState !== false) { if (!document.getElementById('detail').classList.contains('open')) _scrollY = window.scrollY; history.pushState({modal:id}, '', '#'+id); }
  const _tr = LANG!=='ko'&&I18N_CONTENT[LANG]&&I18N_CONTENT[LANG][e.id]||null;
  const rels = (e.rel||[]).map(r=>D.find(x=>x.id===r)).filter(Boolean);
  document.getElementById('modal').innerHTML = `
    <div class="share-actions">
      <button class="share-btn" id="copy-btn" onclick="copyLink('${e.id}')" title="${L.copyLink}"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="8" height="9" rx="1"/><path d="M3 11V3a1 1 0 011-1h6"/></svg></button>
      <button class="share-btn kakao" onclick="shareKakao('${e.id}',this)" title="KakaoTalk"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1C4.13 1 1 3.53 1 6.6c0 1.97 1.31 3.7 3.28 4.67-.1.56-.65 2.03-.68 2.15 0 0-.01.09.04.12.06.04.12.01.12.01.16-.02 1.87-1.23 2.65-1.81.19.02.38.03.59.03 3.87 0 7-2.53 7-5.6S11.87 1 8 1z"/></svg></button>
    </div>
    <div class="modal-cat">${CATS[e.c]}</div>
    <div class="modal-title">${LANG==='ko' ? e.t : (e.en||e.t)}</div>
    <div class="modal-en">${LANG==='ko' ? e.en : (!/[\uAC00-\uD7AF]/.test(e.t)&&e.t!==(e.en||e.t) ? e.t : '')}</div>
    ${e.born ? `<div class="modal-born">${(()=>{const[y,m]=e.born.split('-');return L.born(y,m);})()}</div>` : ''}
    <div class="modal-body"><p>${_tr?_tr.sum:e.sum}</p>${_tr?_tr.det:e.det}</div>
    ${e.tags.length?`<div class="modal-tags">${e.tags.map(t=>`<span onclick="document.getElementById('q').value='${t}';q='${t}';close_m();render()">#${t}</span>`).join('')}</div>`:''}
    ${(e.refs&&e.refs.length)||( e.videos&&e.videos.length)?`<div class="modal-refs">
      ${e.refs&&e.refs.length?`<h4>${L.refs}</h4>${e.refs.map(r=>`<a href="${r.url}" target="_blank" rel="noopener">${r.title}<span class="ref-type">${r.type}</span></a>`).join('')}`:''}
      ${e.videos&&e.videos.length?`<div class="modal-videos"><h4>${L.videos}</h4>${e.videos.map(v=>`<a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener"><span class="yt-icon">▶</span>${v.title}<span class="vid-lang">${v.lang}</span></a>`).join('')}</div>`:''}</div>`:''}
    ${rels.length?`<div class="modal-related"><h4>${L.related}</h4><div class="rel-links">${rels.map(r=>`<span class="rel-link" onclick="open_m('${r.id}')">${LANG==='ko'?r.t:(r.en||r.t)}</span>`).join('')}</div></div>`:''}
  `;
  document.querySelector('.grid-header').style.display='none';
  document.getElementById('grid').style.display='none';
  document.getElementById('pagination').style.display='none';
  document.getElementById('detail').classList.add('open');
  window.scrollTo({top:0});
}

function close_m(pushState) {
  document.getElementById('detail').classList.remove('open');
  document.querySelector('.grid-header').style.display='';
  document.getElementById('grid').style.display='';
  document.getElementById('pagination').style.display='';
  if (pushState !== false && location.hash) history.pushState({}, '', location.pathname+location.search);
  window.scrollTo({top:_scrollY});
}

document.addEventListener('keydown', e => { if(e.key==='Escape'&&document.getElementById('detail').classList.contains('open')) close_m(); });

const BASE_URL='https://aiword-wiki.github.io/';
const KAKAO_KEY=location.hostname==='localhost'||location.hostname==='127.0.0.1'?'c5d123be2f7b4ebcf0373e1866870893':'c8a3dc3ebc83691e6d7878d2ce7ee764';
if(window.Kakao&&KAKAO_KEY&&!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

function _shareFb(btn){
  btn.style.opacity='0.3';
  setTimeout(()=>{btn.style.opacity='';},300);
}
function copyLink(id){
  navigator.clipboard.writeText(BASE_URL+'#'+id).then(()=>_shareFb(document.getElementById('copy-btn')));
}
function shareKakao(id,btn){
  const e=D.find(x=>x.id===id), name=LANG==='ko'?e.t:(e.en||e.t);
  const url=BASE_URL+'#'+id;
  if(window.Kakao&&Kakao.isInitialized()){
    Kakao.Share.sendDefault({
      objectType:'feed',
      content:{title:name+' - AI Wiki',description:e.sum||'',imageUrl:'https://aiword-wiki.github.io/favicon.svg',link:{mobileWebUrl:url,webUrl:url}}
    });
  } else {
    navigator.clipboard.writeText(name+' - AI Wiki\n'+url).then(()=>_shareFb(btn));
  }
}

window.addEventListener('popstate', () => {
  const id = location.hash.slice(1);
  if (id && D.find(x=>x.id===id)) open_m(id, false);
  else close_m(false);
});

// 페이지 로드 시 해시가 있으면 모달 오픈
if (location.hash) { const id = location.hash.slice(1); if (D.find(x=>x.id===id)) open_m(id, false); }

// URL ?q= 파라미터 검색
const _qq = new URLSearchParams(location.search).get('q');
if (_qq) { q = _qq; document.getElementById('q').value = _qq; }

render();

// JSON-LD DefinedTermSet 동적 생성
(function(){
  const ld = document.querySelectorAll('script[type="application/ld+json"]');
  if(ld.length>=2){
    const obj = JSON.parse(ld[1].textContent);
    obj.hasDefinedTerm = D.slice(0,50).map(e=>({
      "@type":"DefinedTerm",
      "name":e.t,
      "description":e.sum,
      "url":"https://aiword-wiki.github.io/#"+e.id
    }));
    ld[1].textContent = JSON.stringify(obj);
  }
})();
</script>
</body>
</html>

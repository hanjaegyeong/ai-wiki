// State
let cat = 'all', q = '';

function render() {
  let list = D.filter(e => {
    if (cat !== 'all' && e.c !== cat) return false;
    if (!q) return true;
    const s = q.toLowerCase();
    return e.t.toLowerCase().includes(s) || e.en.toLowerCase().includes(s) || e.tags.some(t=>t.includes(s));
  }).sort((a,b) => {
    return (b.born||'').localeCompare(a.born||'');
  });

  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML = `<div class="empty">${L.noResults}</div>`; return; }

  const now = new Date(), cutoff = (now.getFullYear()-1)+'-'+String(now.getMonth()+1).padStart(2,'0');
  g.innerHTML = list.map(e => {
    const primary = LANG==='ko' ? e.t : (e.en||e.t);
    const secondary = LANG==='ko' ? e.en : (!/[\uAC00-\uD7AF]/.test(e.t)&&e.t!==primary ? e.t : '');
    const sub = secondary ? `<div class="card-sub">${secondary}</div>` : '';
    const isNew = e.born && e.born >= cutoff;
    return `<div class="card" onclick="open_m('${e.id}')">
      <div class="card-cat">${CATS[e.c]}</div>
      ${isNew ? '<div class="card-new">NEW</div>' : ''}
      <div class="card-keyword">${primary}</div>
      ${sub}
    </div>`;
  }).join('');
}

// Filters
(function(){
  const f = document.getElementById('filters');
  f.innerHTML = `<button class="f on" data-c="all">${L.all}</button>` +
    Object.entries(CATS).map(([k,v])=>`<button class="f" data-c="${k}">${v}</button>`).join('');
  f.addEventListener('click', e => {
    const b = e.target.closest('.f');
    if (!b) return;
    f.querySelectorAll('.f').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    cat = b.dataset.c;
    render();
  });
})();


// Search
document.getElementById('q').addEventListener('input', e => { q = e.target.value.trim(); render(); });

// Modal
function open_m(id, pushState) {
  const e = D.find(x=>x.id===id);
  if (!e) return;
  if (pushState !== false) history.pushState({modal:id}, '', '#'+id);
  const _tr = LANG!=='ko'&&I18N_CONTENT[LANG]&&I18N_CONTENT[LANG][e.id]||null;
  const rels = (e.rel||[]).map(r=>D.find(x=>x.id===r)).filter(Boolean);
  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="close_m()">✕</button>
    <div class="modal-cat">${CATS[e.c]}</div>
    <div class="modal-title">${LANG==='ko' ? e.t : (e.en||e.t)}</div>
    <div class="modal-en">${LANG==='ko' ? e.en : (!/[\uAC00-\uD7AF]/.test(e.t)&&e.t!==(e.en||e.t) ? e.t : '')}</div>
    ${e.born ? `<div class="modal-born">${(()=>{const[y,m]=e.born.split('-');return L.born(y,m);})()}</div>` : ''}
    <div class="modal-body"><p>${_tr?_tr.sum:e.sum}</p>${_tr?_tr.det:e.det}</div>
    ${e.tags.length?`<div class="modal-tags">${e.tags.map(t=>`<span onclick="document.getElementById('q').value='${t}';q='${t}';close_m();render()">#${t}</span>`).join('')}</div>`:''}
    ${(e.refs&&e.refs.length)||( e.videos&&e.videos.length)?`<div class="modal-refs">
      ${e.refs&&e.refs.length?`<h4>${L.refs}</h4>${e.refs.map(r=>`<a href="${r.url}" target="_blank" rel="noopener">${r.title}<span class="ref-type">${r.type}</span></a>`).join('')}`:''}
      ${e.videos&&e.videos.length?`<div class="modal-videos"><h4>${L.videos}</h4>${e.videos.map(v=>`<a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener"><span class="yt-icon">▶</span>${v.title}<span class="vid-lang">${v.lang}</span></a>`).join('')}</div>`:''}</div>`:''}
    ${rels.length?`<div class="modal-related"><h4>${L.related}</h4><div class="rel-links">${rels.map(r=>`<span class="rel-link" onclick="open_m('${r.id}')">${LANG==='ko'?r.t:(r.en||r.t)}</span>`).join('')}</div></div>`:''}
  `;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function close_m(pushState) {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
  if (pushState !== false && location.hash) history.pushState({}, '', location.pathname);
}

document.getElementById('ov').addEventListener('click', e => { if(e.target===e.currentTarget) close_m(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') close_m(); });

window.addEventListener('popstate', () => {
  const id = location.hash.slice(1);
  if (id && D.find(x=>x.id===id)) open_m(id, false);
  else close_m(false);
});

// 페이지 로드 시 해시가 있으면 모달 오픈
if (location.hash) { const id = location.hash.slice(1); if (D.find(x=>x.id===id)) open_m(id, false); }

render();
</script>
</body>
</html>
